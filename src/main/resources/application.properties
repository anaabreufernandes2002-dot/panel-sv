# ==============================
# DATABASE (Postgres - Railway)
# ==============================

spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# NÃO deixa o Hibernate mexer no schema (você já controla via schema.sql)
spring.jpa.hibernate.ddl-auto=none

# ==============================
# SERVER
# ==============================

server.port=${PORT:8080}

# ==============================
# UPLOADS (AGORA SERVIDO PELO STATIC)
# ==============================

app.upload-dir=src/main/resources/static/uploads

# ==============================
# FILE UPLOAD LIMITS
# ==============================

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ==============================
# SQL INIT (rodar schema + data)
# ==============================

spring.sql.init.mode=always
spring.sql.init.platform=postgres
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.data-locations=classpath:data.sql

spring.jpa.defer-datasource-initialization=true
